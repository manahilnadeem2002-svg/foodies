<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Gourmet Bites</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">Gourmet<span>Bites</span></a>
      <button class="hamburger" id="hamburger" aria-label="Toggle Navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </div>
  </nav>

  <main class="page-container">
    <h2 class="section-title">Get In Touch</h2>
    <p class="section-subtitle">We would love to hear from you!</p>
    <div class="contact-container">
      <form id="contact-form">
        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required placeholder="john@example.com">
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" rows="4" required placeholder="Write your message here..."></textarea>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%;">Send Message</button>
      </form>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Gourmet Bites. All Rights Reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
